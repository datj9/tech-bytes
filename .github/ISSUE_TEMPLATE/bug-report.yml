name: Bug Report
description: Report an issue with the Tech Bytes site
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: url
    attributes:
      label: Page URL
      placeholder: "https://bytes.finaldivision.com/..."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false
